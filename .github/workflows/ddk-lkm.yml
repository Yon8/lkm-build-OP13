name: Build KernelSU Kernel Module (DDK)

on:
  workflow_dispatch:
    inputs:
      kmi:
        description: 'KMI version'
        required: true
        type: string
      ddk_release:
        description: 'DDK release version'
        required: false
        default: '20260313'
        type: string
  workflow_call:
    inputs:
      kmi:
        description: 'KMI version'
        required: true
        type: string
      ddk_release:
        description: 'DDK release version'
        required: false
        default: '20260313'
        type: string

jobs:
  build-noopt-ko:
    name: Build noopt.ko for ${{ inputs.kmi }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ylarod/ddk-min:${{ inputs.kmi }}-${{ inputs.ddk_release }}
      options: --privileged

    steps:
    - name: Checkout source code
      uses: actions/checkout@v6

    - name: Build noopt.ko
      run: |
        cd kernel

        echo "=== Building noopt.ko for KMI: ${{ inputs.kmi }} ==="

        CONFIG_KSU=m CC=clang make

        echo "=== Build completed ==="

        # Copy with KMI-specific naming
        mkdir -p /github/workspace/out
        OUTPUT_NAME="${{ inputs.kmi }}_noopt.ko"
        cp noopt.ko "/github/workspace/out/$OUTPUT_NAME"

        echo "Copied to: /github/workspace/out/$OUTPUT_NAME"
        ls -la "/github/workspace/out/$OUTPUT_NAME"
        llvm-strip -d "/github/workspace/out/$OUTPUT_NAME"
        echo "Size after stripping: $(du -h "/github/workspace/out/$OUTPUT_NAME" | cut -f1)"

    - name: Package KernelSU module zip
      run: |
        KO_PATH="/github/workspace/out/${{ inputs.kmi }}_noopt.ko"
        STAGE_DIR="/github/workspace/out/ksu-stage"
        ZIP_PATH="/github/workspace/out/${{ inputs.kmi }}_noopt-ksu.zip"

        rm -rf "$STAGE_DIR"
        mkdir -p "$STAGE_DIR"

        cp -R ksu-module/. "$STAGE_DIR"/
        cp "$KO_PATH" "$STAGE_DIR/noopt.ko"

        chmod 0755 "$STAGE_DIR/service.sh" "$STAGE_DIR/uninstall.sh"

        find "$STAGE_DIR" -type f \( -name "*.conf" -o -name "*.css" -o -name "*.html" -o -name "*.js" -o -name "*.md" -o -name "*.prop" -o -name "*.sh" \) -exec sed -i 's/\r$//' {} +

        python3 - "$STAGE_DIR" "$ZIP_PATH" <<'PYEOF'
        import zipfile, os, sys
        stage = sys.argv[1]
        out = sys.argv[2]
        with zipfile.ZipFile(out, "w", zipfile.ZIP_DEFLATED) as zf:
            for root, dirs, files in os.walk(stage):
                for f in files:
                    full = os.path.join(root, f)
                    arcname = os.path.relpath(full, stage)
                    zf.write(full, arcname)
        print("Created: {} ({} bytes)".format(out, os.path.getsize(out)))
        PYEOF

    - name: Upload noopt.ko artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.kmi }}-lkm
        path: /github/workspace/out/${{ inputs.kmi }}_noopt.ko

    - name: Upload KernelSU module zip
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.kmi }}-ksu-module
        path: /github/workspace/out/${{ inputs.kmi }}_noopt-ksu.zip
